<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Kings Influenciadores</title>

<style>

body{
margin:0;
background:#000;
display:flex;
justify-content:center;
}

.container{
position:relative;
width:100%;
max-width:420px;
}

.container img{
width:100%;
display:block;
}

/* BOTÃO CONTINUAR */

.continuar{
position:absolute;
bottom:7%;
left:50%;
transform:translateX(-50%);
width:70%;
height:55px;
background:transparent;
border:none;
cursor:pointer;
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:white;
padding:20px;
}

.qr{
width:240px;
margin:20px;
border-radius:10px;
}

.botao{
background:#ff9f1c;
padding:14px 25px;
margin:10px;
border-radius:10px;
color:white;
text-decoration:none;
font-size:18px;
display:inline-block;
}

.fechar{
position:absolute;
top:20px;
right:25px;
font-size:30px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<img src="https://i.postimg.cc/j57cJvG6/13DE1ED8-A490-486C-A292-31EA304E74E7.png">

<button class="continuar" onclick="abrir()"></button>

</div>


<div class="popup" id="popup">

<div class="fechar" onclick="fechar()">✕</div>

<h2>Fale com a The Kings 👑</h2>

<p>Escaneie o QR Code ou entre em contato:</p>

<img class="qr" src="https://i.postimg.cc/8cLvT0xt/Whats-App.jpg">

<a class="botao" href="https://wa.me/" target="_blank">Abrir WhatsApp</a>

<a class="botao" href="https://www.instagram.com/the_kings_acai?igsh=MWNydGxwdzg0eHk1Mw==" target="_blank">
Ir para Instagram
</a>

</div>

<script>

function abrir(){
document.getElementById("popup").style.display="flex"
}

function fechar(){
document.getElementById("popup").style.display="none"
}

</script>

</body>
</html>
